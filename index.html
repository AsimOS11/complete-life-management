─────────────────────────────────────────────────────
4.3 GOAL SETTING FRAMEWORKS
─────────────────────────────────────────────────────
A) SMART Goals:
• Specific — Exactly what do you want?
• Measurable — How will you track it?
• Achievable — Is it realistic yet challenging?
• Relevant — Does it align with your values?
• Time-bound — By when exactly?
B) OKRs (Objectives & Key Results) — Google/Intel Framework:
• Objective: Where do I want to go? (Qualitative, inspiring)
• Key Results: How do I know I'm getting there? (Quantitative, measurable)
• Set 3-5 Key Results per Objective
• Review weekly
C) The 12 Week Year (Brian Moran):
• A year's work compressed into 12 weeks
• Creates urgency, eliminates complacency
• 4 execution cycles per year instead of 1
D) BHAG — Big Hairy Audacious Goals (Jim Collins):
• 10-25 year horizon goals
• So big they seem impossible, but clear and compelling
• Drives breakthrough innovation and effort
E) Backward Goal Setting (Reverse Engineering):
• Start at the end goal
• Work backward: What must be true 1 year before? 6 months? 3 months? This week?
• Creates a clear roadmap
─────────────────────────────────────────────────────
4.4 GOAL ACHIEVEMENT SYSTEM
─────────────────────────────────────────────────────
• Annual goals → Quarterly goals → Monthly goals → Weekly targets → Daily tasks
• The ONE Thing (Gary Keller) — What is the single most important task?
• Focus on Lead Measures vs Lag Measures (4DX Framework)
• Tracking cadence — weekly review every Sunday
• Accountability system: partner, journal, app
• Dealing with goal failure — pivot vs quit distinction
• Celebrating milestones (motivation maintenance)
─────────────────────────────────────────────────────

─────────────────────────────────────────────────────

Odyssey Planning — 3 alternative 5-year plans
Life/Work Workview — Why do you work? What is life for?
• The 4-Hour Work Week framework (Tim Ferriss):
DEAL: Definition, Elimination, Automation, Liberation
Lifestyle design vs career ladder climbing
• The Good Life Framework (Robert Waldinger — Harvard Study):
Relationships are the #1 predictor of happiness and longevity
• Retirement Planning mindset shift:
Don't defer all enjoyment — live fully NOW and LATER

5.2 THE CORE FRAMEWORKS
─────────────────────────────────────────────────────
A) Eisenhower Matrix (Priority Matrix):
• Q1 — Urgent & Important: Crisis, deadlines, emergencies (DO NOW)
• Q2 — Not Urgent & Important: Planning, relationships, growth (SCHEDULE)
• Q3 — Urgent & Not Important: Interruptions, some meetings (DELEGATE)
• Q4 — Not Urgent & Not Important: Scrolling, timewasters (ELIMINATE)
→ GOAL: Spend 70%+ of time in Q2
B) Getting Things Done (GTD) — David Allen:
• Capture → Clarify → Organize → Reflect → Engage
• The 2-Minute Rule: If it takes less than 2 minutes, do it now
• Inbox Zero mindset
• Weekly Review practice
• Context-based task lists
C) Time Blocking:
• Block time for deep work (2-4 hour blocks)
• Theme your days (Content Monday, Meeting Tuesday, etc.)
• Protect morning hours for important tasks
• Buffer blocks between tasks (10-15 min)
• Batch similar tasks together
D) The Pomodoro Technique (Francesco Cirillo):
• 25 minutes focused work + 5 minute break = 1 Pomodoro
• After 4 Pomodoros: 15-30 minute long break
• Track completed Pomodoros daily
• Use for shallow work and learning
E) Deep Work (Cal Newport):
• Deep Work: Cognitively demanding, distraction-free
• Shallow Work: Logistical, not creating much value
• 4 Deep Work Philosophies:

Monastic: total isolation (monks, authors)
Bimodal: blocks of deep work (days/weeks)
Rhythmic: same time daily
Journalistic: whenever you can
• Creating a deep work ritual
• Measuring depth: Hours of deep work per day
─────────────────────────────────────────────────────
5.3 THE LAWS OF TIME MANAGEMENT
─────────────────────────────────────────────────────
• Parkinson's Law: Work expands to fill time available →
Set shorter deadlines
• Pareto's Principle (80/20): 80% of results from 20% of effort →
Identify your highest-leverage tasks
• Hofstadter's Law: Things always take longer than expected →
Add buffer time to all estimates
• Yerkes-Dodson Law: Performance peaks at moderate pressure →
Not too relaxed, not too stressed
• Zeigarnik Effect: Incomplete tasks occupy mental bandwidth →
Capture everything, clear the mental RAM
• The Planning Fallacy: We underestimate task time →
Multiply your time estimates by 1.5x
• The Law of Diminishing Returns: More hours ≠ more output →
Work smarter with focused bursts

12.2 HOW TO LEARN FASTER & BETTER
─────────────────────────────────────────────────────
A) The Feynman Technique (Nobel Prize winner's method):

Choose a concept
Explain it as if teaching a 5-year-old
Identify gaps in your explanation
Review source material to fill gaps
Simplify and use analogies
B) Spaced Repetition (Ebbinghaus Forgetting Curve):
• Review at increasing intervals: 1 day, 3 days, 1 week, 2 weeks, 1 month
• Tools: Anki, Remnote
• 90% retention vs 20% without repetition
C) Active Recall:
• Testing yourself > re-reading
• The Testing Effect (cognitive science)
• Flashcards, practice questions, teaching others
D) Interleaving:
• Mix different subjects/skills in practice
• Harder but leads to deeper learning
E) Sleep consolidation:
• Sleep after learning to consolidate memory
• "Sleep is the learn-save button" — Matthew Walker

        // Parsing logic natively translated from the React Component
        function renderNotebook(text) {
            const lines = text.split('\n');
            let outputHTML = '';
            let isStickyActive = false;
            let stickyBuffer = [];
            let stickyType = '';

            const flushSticky = () => {
                if (stickyBuffer.length > 0) {
                    outputHTML += `
                        <div class="sticky-note group relative mx-auto my-6 max-w-sm rotate-[-2deg] bg-[#ffeb3b] p-4 text-gray-800 shadow-md transition-transform hover:rotate-0">
                            <div class="absolute -top-3 left-1/2 h-6 w-12 -translate-x-1/2 bg-red-400/50 mix-blend-multiply" style="clip-path: polygon(5% 0, 95% 5%, 100% 100%, 0 95%)"></div>
                            <span class="block font-['Kalam'] text-sm font-bold uppercase text-red-700">${stickyType}</span>
                            ${stickyBuffer.map(line => `<p class="font-['Caveat'] text-lg leading-tight">${line}</p>`).join('')}
                        </div>
                    `;
                    stickyBuffer = [];
                }
                isStickyActive = false;
            };

            lines.forEach((line) => {
                // Empty Lines
                if (!line.trim()) {
                    if (!isStickyActive) outputHTML += '<div class="h-6"></div>';
                    return;
                }

                // Implicit sticky note flush bounds
                if (isStickyActive && (line.includes('─') || line.includes('━') || line.includes('MODULE'))) {
                    flushSticky();
                }

                // Dividers
                if (/^[=─━]+$/.test(line)) {
                    if (!isStickyActive) {
                        outputHTML += `
                            <div class="my-4 flex items-center justify-center opacity-70">
                                <svg width="100%" height="15" viewBox="0 0 500 15" preserveAspectRatio="none">
                                    <path d="M0,7 Q125,12 250,7 T500,7" fill="none" stroke="#1a237e" stroke-width="2" stroke-dasharray="10 5" style="filter: url(#roughpaper)" />
                                </svg>
                            </div>
                        `;
                    }
                    return;
                }

                // Headings
                if (line.includes('MODULE') || line.includes('THE COMPLETE LIFE MANAGEMENT') || line.includes('MASTER PRINCIPLES')) {
                    flushSticky();
                    outputHTML += `
                        <h2 class="relative z-10 my-6 font-['Kalam'] text-2xl font-bold uppercase text-[#B71C1C] md:text-3xl">
                            ${line}
                            <svg class="absolute -bottom-2 left-0 -z-10 h-4 w-full opacity-60" preserveAspectRatio="none" viewBox="0 0 100 10">
                                <path d="M0,5 Q50,0 100,5" stroke="#ffe066" stroke-width="8" fill="none" stroke-linecap="round"/>
                            </svg>
                        </h2>
                    `;
                    return;
                }

                // Subheadings
                if (/^[0-9]+\.[0-9]+\s+[A-Z\s&]+$/.test(line)) {
                    outputHTML += `<h3 class="mt-6 mb-2 font-['Kalam'] text-xl font-bold text-[#B71C1C]">${line}</h3>`;
                    return;
                }

                // Key Insights / Sticky triggers
                if (line.startsWith('Key Insight:') || line.startsWith('Key Principles:') || line.startsWith('Exercise:')) {
                    isStickyActive = true;
                    stickyType = line.includes('Exercise') ? 'Action Item' : (Math.random() > 0.5 ? 'Exam Tip' : 'Memory Trick');
                    stickyBuffer.push(line);
                    return;
                }

                // Continue sticky accumulation
                if (isStickyActive) {
                    stickyBuffer.push(line);
                    return;
                }

                // List checks and bullets
                let parsedLine = line;
                let isBullet = false;
                let isCheckbox = false;

                if (parsedLine.startsWith('□')) {
                    isCheckbox = true;
                    parsedLine = parsedLine.substring(1).trim();
                } else if (parsedLine.startsWith('•') || parsedLine.startsWith('→')) {
                    isBullet = true;
                    parsedLine = parsedLine.substring(1).trim();
                }

                // Text Highlighting
                const highlightMatch = parsedLine.match(/^([^—-]+)([—-].*)$/);
                let contentNode = '';

                if (highlightMatch && highlightMatch[1].trim().length < 40) {
                    contentNode = `<mark class="rounded-sm bg-[#ffe066]/70 px-1 py-0.5 text-inherit shadow-[0_0_3px_#ffe066]">${highlightMatch[1].trim()}</mark>${highlightMatch[2]}`;
                } else if (parsedLine.includes('Ikigai') || parsedLine.includes('IKIGAI') || parsedLine.includes('Tawheed')) {
                    contentNode = parsedLine.replace(/(IKIGAI|Ikigai|Tawheed)/g, '<mark class="bg-[#ffe066]/70 rounded-sm px-1 shadow-[0_0_3px_#ffe066] text-inherit">$1</mark>');
                } else {
                    contentNode = parsedLine;
                }

                // Random doodles logic
                const hasDoodle = isBullet && Math.random() > 0.85;
                let doodleGraphic = '';
                if (hasDoodle) {
                    const arrowSVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#B71C1C" stroke-width="2"><path d="M12 2L15 9l7 1-5 5 1 7-7-4-7 4 1-7-5-5 7-1z" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
                    const checkSVG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#B71C1C" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
                    doodleGraphic = `
                        <div class="absolute right-[-40px] top-1 opacity-60 md:right-[-60px]">
                            ${Math.random() > 0.5 ? arrowSVG : checkSVG}
                        </div>
                    `;
                }

                // Standard line assembly
                outputHTML += `
                    <div class="relative flex items-start space-x-3 leading-relaxed">
                        ${isCheckbox ? `<div class="mt-1 flex h-4 w-4 shrink-0 items-center justify-center border-2 border-[#1a237e]/80" style="border-radius: 2px 4px 3px 2px;"></div>` : ''}
                        ${isBullet ? `<div class="mt-2.5 h-1.5 w-1.5 shrink-0 rounded-full bg-[#1a237e]"></div>` : ''}
                        <div class="flex-1 font-['Caveat'] text-xl tracking-wide text-[#1a237e] md:text-[22px]">
                            ${contentNode}
                        </div>
                        ${doodleGraphic}
                    </div>
                `;
            });

            flushSticky();
            return outputHTML;
        }

        // Initialize and Mount
        document.getElementById('notebook-content').innerHTML = renderNotebook(RAW_TEXT);
    </script>
